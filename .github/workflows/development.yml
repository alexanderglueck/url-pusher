name: Continuous Integration

on: [push]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the testing image
        run: docker build --target testing -t urlpusher-test .

      - name: Run the test suite
        run: docker run --rm -e APP_KEY=base64:$(openssl rand -base64 32) urlpusher-test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Deploy
        run: |
          if [ "${{ secrets.DEPLOY_HOOK }}" != "" ]; then
            curl "${{ secrets.DEPLOY_HOOK }}?event=${{ github.event_name }}&ref=${{ github.ref }}&repo=${{ github.repository }}"
          fi
